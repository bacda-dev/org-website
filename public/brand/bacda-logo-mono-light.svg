<?xml version="1.0" encoding="UTF-8"?>
<!--
  BACDA monochrome light variant (#FAF7F2 cream).
  Used over dark hero overlays and photo scrims.

  This is a SIMPLIFIED silhouette — not a 1:1 raster trace. It reproduces
  the brand geometry (a dancer figure paired with the "BACDA" wordmark and
  the "BAY AREA CREATIVE DANCE ACADEMY" wings) in a single flat color per
  PRD §14.3.2. Editorial serif letterforms match the Fraunces typographic
  voice of the site.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 600 220"
     width="600"
     height="220"
     role="img"
     aria-label="Bay Area Creative Dance Academy">
  <title>Bay Area Creative Dance Academy</title>
  <g fill="#FAF7F2">
    <!-- Dancer silhouette: stylized figure with outstretched arm + flowing drape -->
    <g transform="translate(290, 20)">
      <!-- head -->
      <circle cx="10" cy="16" r="10" />
      <!-- torso + raised arm -->
      <path d="M10 28
               C 4 32, 2 42, 4 54
               L 8 82
               C 10 92, 14 96, 18 96
               L 22 96
               C 26 96, 30 92, 32 82
               L 36 54
               C 38 42, 36 32, 30 28 Z" />
      <!-- raised arm (reaching up and right) -->
      <path d="M28 34
               C 40 26, 54 14, 70 4
               C 72 2, 74 4, 74 6
               C 60 18, 48 30, 36 40 Z" />
      <!-- trailing hand on left -->
      <path d="M6 46
               C -6 50, -14 58, -18 68
               C -20 72, -17 74, -13 72
               C -4 66, 4 60, 10 54 Z" />
      <!-- flowing drape / skirt -->
      <path d="M8 96
               C -4 116, -2 138, 8 160
               C 14 172, 20 180, 20 180
               C 16 164, 18 148, 22 132
               C 26 116, 24 108, 22 96 Z" />
      <path d="M30 96
               C 42 112, 46 132, 42 152
               C 38 170, 30 184, 24 188
               C 28 168, 30 148, 28 128
               C 27 116, 28 104, 30 96 Z" />
    </g>

    <!-- Wordmark: B A C D A in an editorial serif.
         Letters are constructed as simple geometric paths — not a webfont
         dependency — so the SVG is fully self-contained. -->
    <g transform="translate(60, 96)" stroke="#FAF7F2" stroke-width="0">
      <!-- B -->
      <path d="M0 0 L0 90 L30 90
               C 52 90, 62 78, 62 66
               C 62 56, 56 48, 46 44
               C 54 40, 58 32, 58 24
               C 58 10, 48 0, 30 0 Z
               M14 10 L28 10 C 38 10, 44 16, 44 24 C 44 32, 38 38, 28 38 L14 38 Z
               M14 48 L30 48 C 42 48, 48 56, 48 66 C 48 76, 42 82, 30 82 L14 82 Z" />

      <!-- A (first — after BACDA gap the next letter starts at 78) -->
      <path d="M78 90 L100 0 L116 0 L138 90 L124 90 L119 68 L97 68 L92 90 Z
               M100 58 L116 58 L108 22 Z" />

      <!-- C -->
      <path d="M200 45
               C 200 18, 218 -2, 244 -2
               C 260 -2, 272 4, 278 14
               L 268 22
               C 262 14, 254 10, 244 10
               C 226 10, 214 24, 214 45
               C 214 66, 226 80, 244 80
               C 254 80, 262 76, 268 68
               L 278 76
               C 272 86, 260 92, 244 92
               C 218 92, 200 72, 200 45 Z" />

      <!-- D (centered area ~ x=310) -->
      <path d="M300 0 L300 90 L330 90
               C 358 90, 376 72, 376 45
               C 376 18, 358 0, 330 0 Z
               M314 10 L330 10 C 350 10, 362 24, 362 45 C 362 66, 350 80, 330 80 L314 80 Z" />

      <!-- A (final) -->
      <path d="M396 90 L418 0 L434 0 L456 90 L442 90 L437 68 L415 68 L410 90 Z
               M418 58 L434 58 L426 22 Z" />
    </g>

    <!-- Left wing: BAY AREA CREATIVE -->
    <g transform="translate(44, 204)">
      <text font-family="Georgia, 'Times New Roman', serif"
            font-size="14"
            letter-spacing="3"
            fill="#FAF7F2">BAY AREA CREATIVE</text>
    </g>

    <!-- Right wing: DANCE ACADEMY -->
    <g transform="translate(410, 204)">
      <text font-family="Georgia, 'Times New Roman', serif"
            font-size="14"
            letter-spacing="3"
            fill="#FAF7F2">DANCE ACADEMY</text>
    </g>
  </g>
</svg>
