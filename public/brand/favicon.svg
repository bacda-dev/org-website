<?xml version="1.0" encoding="UTF-8"?>
<!--
  BACDA favicon (vector). Square mark optimized for 16-48px tab display.
  Warm amber "B" on cream background + subtle dancer accent.
  The color matches the --burgundy token (logo-derived burnt amber #C2570B).
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     width="64"
     height="64"
     role="img"
     aria-label="BACDA">
  <title>BACDA</title>
  <rect width="64" height="64" rx="10" fill="#FAF7F2" />
  <g fill="#C2570B">
    <!-- Stylized "B" — editorial serif letterform, centered. -->
    <path d="M18 14
             L18 50
             L32 50
             C 41 50, 46 45, 46 39
             C 46 34, 43 30, 38 29
             C 42 28, 44 25, 44 20
             C 44 16, 40 14, 33 14 Z
             M24 18
             L32 18
             C 36 18, 39 20, 39 23
             C 39 27, 36 29, 32 29
             L 24 29 Z
             M24 33
             L33 33
             C 38 33, 41 36, 41 40
             C 41 43, 38 46, 32 46
             L 24 46 Z" />
    <!-- Small dancer accent (dot + arc) in the top-right to echo the logo. -->
    <circle cx="49" cy="17" r="2.8" />
    <path d="M45 22 Q 52 24, 52 32" stroke="#C2570B" stroke-width="2.5" fill="none" stroke-linecap="round" />
  </g>
</svg>
